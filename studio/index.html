<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>dropweb emoji studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--checker:repeating-conic-gradient(#2b2c33 0 25%,#1a1b20 0 50%) 50%/18px 18px;
  /* Lumina design tokens (source: dropweb-site/src/index.css) */
  --void:#030305;--surface-1:#060608;--surface-2:#0A0A0D;--surface-3:#0F0F12;--surface-glass:#08090C;
  --accent:#15803D;--accent-2:#22C55E;--accent-bright:#00DE52;--accent-deep:#006625;--orb-1:#009938;--orb-2:#2BFF7A;
  --text:#e2e2e2;--text-dim:#9AA0AA;--warning:#F59E0B;--error:#EF4444;
  --r-xs:10px;--r-sm:12px;--r-base:14px;--r-md:16px;--r-lg:24px;--r-bento:26px;
  --ease-lumina:cubic-bezier(0.2,0.8,0.2,1);
  --shadow-cta:0 8px 24px -8px color-mix(in srgb, var(--orb-1) 55%, transparent);
  --shadow-cta-hover:0 12px 32px -8px color-mix(in srgb, var(--orb-1) 80%, transparent);
  --lumina-fill:linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
  --lumina-fill-hover:linear-gradient(145deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
  /* Legacy token aliases (kept so inline styles & old refs still resolve) */
  --bg:var(--void);
  --surf-1:var(--surface-2);--surf-2:var(--surface-glass);--surf-3:var(--surface-2);--surf-4:var(--surface-3);
  --line:color-mix(in srgb,var(--accent-bright) 14%,transparent);--line-2:color-mix(in srgb,var(--accent-bright) 18%,transparent);--line-3:color-mix(in srgb,var(--accent-bright) 12%,transparent);
  --muted:var(--text-dim);--muted-2:var(--text-dim);--muted-3:var(--text-dim);--faint:var(--text-dim);
  --err:var(--error);
  --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;
}
*{box-sizing:border-box}
html,body{background:var(--void)}
body{margin:0;color:var(--text);font:13px/1.4 "Onest",system-ui,sans-serif;display:grid;grid-template-columns:260px 1fr 310px;height:100vh}
.aura{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(40% 50% at 18% 22%, color-mix(in srgb,var(--accent) 18%,transparent) 0%, transparent 70%),
    radial-gradient(45% 55% at 82% 30%, color-mix(in srgb,var(--orb-2) 12%,transparent) 0%, transparent 70%),
    radial-gradient(50% 60% at 50% 88%, color-mix(in srgb,#38BDF8 12%,transparent) 0%, transparent 72%);
  filter:blur(60px) saturate(1.1);will-change:opacity;animation:auraBreathe 14s ease-in-out infinite;}
@keyframes auraBreathe{0%,100%{opacity:.85}25%{opacity:1}50%{opacity:.85}75%{opacity:.7}}
@media (prefers-reduced-motion:reduce){.aura{animation:none;opacity:.85}}
.glass{background:var(--lumina-fill);border:1px solid color-mix(in srgb,var(--accent-bright) 22%,transparent);
  border-radius:var(--r-bento);box-shadow:inset 0 1px 0 0 rgba(255,255,255,.05),0 4px 14px rgba(0,0,0,.18);
  -webkit-backdrop-filter:blur(6px) saturate(1.05);backdrop-filter:blur(6px) saturate(1.05);}
#grid{overflow:auto;border-right:1px solid color-mix(in srgb,var(--accent-bright) 18%,transparent);padding:9px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;align-content:start;background:var(--lumina-fill);-webkit-backdrop-filter:blur(6px) saturate(1.05);backdrop-filter:blur(6px) saturate(1.05)}
.cell{background:var(--lumina-fill);border:1px solid color-mix(in srgb,var(--accent-bright) 14%,transparent);
  border-radius:var(--r-md);padding:5px;cursor:pointer;text-align:center;box-shadow:inset 0 1px 0 0 rgba(255,255,255,.04);
  transition:transform .35s var(--ease-lumina),border-color .35s var(--ease-lumina),box-shadow .35s var(--ease-lumina)}
.cell:hover{border-color:color-mix(in srgb,var(--accent-bright) 40%,transparent);transform:translateY(-2px)}
.cell.sel{border-color:var(--accent-bright);
  box-shadow:0 0 0 1px var(--accent-bright),0 0 18px -2px color-mix(in srgb,var(--accent-bright) 60%,transparent)}
.cell .lp{width:100%;aspect-ratio:1;background:var(--checker,#000);border-radius:var(--r-sm)}
.cell .nm{font-size:9px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#stage{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#big{width:300px;height:300px;background:var(--checker,#000);border:1px solid color-mix(in srgb,var(--accent-bright) 22%,transparent);border-radius:var(--r-lg);box-shadow:inset 0 1px 0 0 rgba(255,255,255,.05),0 8px 28px rgba(0,0,0,.3)}
#bgrow button,.mini{background:var(--lumina-fill);color:var(--text-dim);border:1px solid color-mix(in srgb,var(--accent-bright) 18%,transparent);border-radius:var(--r-base);padding:5px 10px;cursor:pointer;font:600 12px "Onest",sans-serif;transition:border-color .3s var(--ease-lumina),color .3s var(--ease-lumina)}
#bgrow button:hover,.mini:hover{border-color:color-mix(in srgb,var(--accent-bright) 40%,transparent);color:var(--text)}
#panel{border-left:1px solid color-mix(in srgb,var(--accent-bright) 18%,transparent);padding:14px;overflow:auto;background:var(--lumina-fill);-webkit-backdrop-filter:blur(6px) saturate(1.05);backdrop-filter:blur(6px) saturate(1.05)}
h1{font-size:14px;color:var(--accent-bright);margin:0 0 10px;font:700 14px "Onest",sans-serif;letter-spacing:.02em}
.sect{font-size:11px;color:color-mix(in srgb,var(--accent-2) 80%,white);letter-spacing:.04em;text-transform:uppercase;margin:var(--s4) 0 var(--s2);padding-top:var(--s3);border-top:1px solid color-mix(in srgb,var(--accent-bright) 16%,transparent);font:700 11px "Onest",sans-serif}
.sect.first{margin-top:0;padding-top:0;border-top:0}
label{display:block;font-size:11px;color:var(--text-dim);margin:11px 0 3px;font-family:"Onest",sans-serif}
.val{float:right;color:var(--accent-bright);font-family:"JetBrains Mono",monospace}
select,input[type=range],input[type=text],textarea{width:100%}
input[type=checkbox]{accent-color:var(--accent-bright)}
select,input[type=text],textarea{background:var(--surface-glass);color:var(--text);border:1px solid color-mix(in srgb,var(--accent-bright) 18%,transparent);border-radius:var(--r-base);padding:6px;font-family:"Onest",sans-serif;font-size:13px}
#genid{font-family:"JetBrains Mono",monospace}
textarea{min-height:58px;resize:vertical}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;
  background:linear-gradient(90deg,var(--accent-bright),var(--accent-deep));outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:var(--accent-bright);box-shadow:0 0 8px -1px var(--accent-bright);cursor:pointer}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border:0;border-radius:50%;background:var(--accent-bright);cursor:pointer}
input[type=range]:focus-visible{outline:2px solid var(--accent-bright);outline-offset:3px}
.btn{display:block;width:100%;margin-top:9px;background:linear-gradient(145deg,var(--orb-1),var(--accent-deep));color:#eafff1;border:0;border-radius:var(--r-md);padding:11px;font:600 13px "Onest",sans-serif;cursor:pointer;min-height:40px;box-shadow:var(--shadow-cta);transition:transform .3s var(--ease-lumina),box-shadow .3s var(--ease-lumina)}
.btn:hover{box-shadow:var(--shadow-cta-hover);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.sec{background:var(--lumina-fill);color:var(--text-dim);border:1px solid color-mix(in srgb,var(--accent-bright) 18%,transparent);box-shadow:none}
.btn.sec:hover{border-color:color-mix(in srgb,var(--accent-bright) 40%,transparent);color:var(--text);box-shadow:none;transform:none}
.swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.sw{width:24px;height:24px;border-radius:var(--r-xs);cursor:pointer;border:2px solid var(--surface-2)}
.sw.on{border-color:#fff;box-shadow:0 0 0 2px var(--accent-bright),0 0 12px -1px color-mix(in srgb,var(--accent-bright) 70%,transparent)}
.row{display:flex;gap:8px}.row>*{flex:1}
.hint{font-size:10px;color:var(--text-dim);margin-top:12px;font-family:"Onest",sans-serif}
.genbox{background:var(--lumina-fill);border:1px solid color-mix(in srgb,var(--accent-bright) 22%,transparent);border-radius:var(--r-bento);padding:10px;margin:0 0 12px;box-shadow:inset 0 1px 0 0 rgba(255,255,255,.05),0 4px 14px rgba(0,0,0,.18);-webkit-backdrop-filter:blur(6px) saturate(1.05);backdrop-filter:blur(6px) saturate(1.05)}
.genbox h2{font-size:11px;color:var(--accent-2);margin:0 0 6px;letter-spacing:.04em;font:600 11px "Onest",sans-serif}
.status{min-height:14px;font-size:10px;color:var(--text-dim);margin-top:6px;font-family:"Onest",sans-serif}.status.err{color:var(--error)}.status.ok{color:var(--accent-bright)}
#cur{font-family:"JetBrains Mono",monospace}
.cell:focus-visible,.btn:focus-visible,.mini:focus-visible,.sw:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible,#bgrow button:focus-visible{outline:2px solid var(--accent-bright);outline-offset:2px;border-color:var(--accent-bright)}
#packsel{flex:1}
.emptygrid{padding:20px;color:var(--text-dim);font-size:12px;text-align:center;border:1px dashed color-mix(in srgb,var(--accent-bright) 30%,transparent);border-radius:var(--r-md);margin:8px;font-family:"Onest",sans-serif}
@media (max-width:1100px){
  body{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto;min-height:100vh}
  #grid{border-right:0;border-bottom:1px solid color-mix(in srgb,var(--accent-bright) 12%,transparent);grid-template-columns:none;grid-auto-flow:column;grid-auto-columns:96px;overflow-x:auto;overflow-y:hidden}
  #stage{padding:var(--s4) 0}
  #panel{border-left:0;border-top:1px solid color-mix(in srgb,var(--accent-bright) 16%,transparent)}
}
@media (max-width:640px){
  #grid{grid-auto-columns:84px}
  #big{width:auto;max-width:92vw;height:auto;aspect-ratio:1}
  .row{flex-wrap:wrap}
  .mini{min-height:40px}
  #bgrow button{min-height:40px}
  body{overflow-x:hidden}
}
</style></head><body>
<div class="aura" aria-hidden="true"></div>
<aside id="grid" aria-label="Эмодзи пака" tabindex="0"></aside>
<main id="stage"><div id="big"></div><div id="bgrow">
  <button onclick="setBg('checker')">клетка</button><button onclick="setBg('#000')">чёрный</button><button onclick="setBg('#0e1621')">чат</button><button onclick="setBg('#e9eef0')">светлый</button>
  <span id="cur" style="margin-left:8px;color:var(--muted-2)"></span></div></main>
<aside id="panel" aria-label="Настройки">
  <h1 id="studioTitle">STUDIO · dropweb</h1>
  <div class="row" style="margin:0 0 10px">
    <select id="packsel" aria-label="Пак"></select>
    <button id="newpack" class="mini" type="button">＋ Пак</button>
    <button id="renpack" class="mini" type="button" title="Переименовать пак" aria-label="Переименовать пак">✎</button>
    <button id="delpack" class="mini" type="button" title="Удалить пак" aria-label="Удалить пак">🗑</button>
  </div>
  <div class="genbox">
    <h2>Создать из промта</h2>
    <label for="genid">id</label><input type="text" id="genid" placeholder="slug">
    <label for="prompt">prompt</label><textarea id="prompt" placeholder="неоновый стикер dropweb..."></textarea>
    <div class="row"><label for="gencolor" style="flex:0 0 auto">Цвет</label><input type="color" id="gencolor" value="#00DE52" aria-label="Цвет генерации" style="height:30px;border:1px solid var(--line-2);border-radius:8px;background:var(--surf-2)"><button id="refBtn" class="mini" type="button">📎 Референс</button></div>
    <input type="file" id="reffile" accept="image/*" aria-label="Референс-изображение" hidden>
    <div id="refthumb" style="display:none;align-items:center;gap:8px;margin:6px 0">
      <img id="refimg" alt="референс" style="width:40px;height:40px;object-fit:cover;border-radius:var(--r-sm);border:1px solid color-mix(in srgb,var(--accent-bright) 40%,transparent)">
      <span style="flex:1;font-size:11px;color:var(--text-dim)">референс прикреплён</span>
      <button id="refclear" class="mini" type="button" aria-label="Убрать референс" style="padding:4px 8px">✕</button>
    </div>
    <button class="btn" id="generate">✨ Генерировать</button>
    <div class="row"><button class="btn sec" id="uploadBtn">⬆ Загрузить PNG</button><button class="btn sec" id="regen">♻ Перегенерить</button></div>
    <input type="file" id="pngfile" accept="image/png" aria-label="Загрузить PNG" hidden>
    <button class="btn sec" id="save">💾 Сохранить</button>
    <div class="hint" style="margin-top:8px">Генерация ~1–3 мин. Стиль авто-выправляется под плоскую неон-иконку.</div><div class="status" id="genstatus"></div>
  </div>
  <div id="curname" style="color:var(--text)"></div>
  <button id="delemoji" class="mini" type="button" style="margin-top:4px" title="Удалить эмодзи">🗑 Удалить эмодзи</button>
  <div class="sect">Анимация / Стиль</div>
  <label for="kind">Анимация</label><select id="kind" aria-label="Анимация"></select>
  <label for="kind2">Микс (2-й слой)</label><select id="kind2" aria-label="Микс, 2-й слой"></select>
  <label for="beats">Биты <span class="val" id="vbeats"></span></label><input type="range" id="beats" min="1" max="4" step="1">
  <label for="amp">Амплитуда <span class="val" id="vamp"></span></label><input type="range" id="amp" min="2" max="60" step="1">
  <label for="ov">Overshoot <span class="val" id="vov"></span></label><input type="range" id="ov" min="0" max="30" step="1">
  <label for="sw">Цвет</label>
  <div class="swatches" id="sw"></div>
  <div class="row" style="margin-top:6px"><input type="color" id="custom" value="#00DE52" aria-label="Свой цвет" style="height:30px;border:1px solid var(--line-2);border-radius:8px;background:var(--surf-2)">
  <button class="mini" id="rainbow">🌈 Радуга</button></div>
  <div class="row" style="margin-top:6px"><button class="mini" id="outline">⬭ Обводка</button><input type="range" id="width" min="4" max="40" step="1" aria-label="Толщина обводки"></div>
  <label class="row" style="gap:8px;cursor:pointer;align-items:center;margin-top:8px" for="bgtile">
    <input type="checkbox" id="bgtile" style="width:auto;flex:0 0 auto">
    <span>Фон-плитка (тёмный куб)</span>
  </label>
  <div id="bgctl" class="row" style="display:none;margin-top:6px;gap:8px;align-items:center">
    <input type="range" id="bgrx" min="0" max="34" step="1" aria-label="Радиус фона" title="Радиус фона" style="flex:1">
    <input type="color" id="bgfill" value="#08090C" aria-label="Цвет фона" style="height:28px;width:40px;border:1px solid var(--line-2);border-radius:8px;background:var(--surf-2)">
  </div>
  <div class="sect">Экспорт</div>
  <div class="row"><button class="btn sec" onclick="rnd()">🎲 Рандом (эта)</button><button class="btn sec" onclick="rndAll()">🎲 Всем</button></div>
  <button class="btn sec" onclick="rnd(true)">🔥 Crazy (эта)</button>
  <button class="btn" onclick="exportOne()">⬇ Render .tgs (эта)</button>
  <button class="btn sec" onclick="exportAll()">⬇ Render ВСЕ (.zip)</button>
  <button class="btn sec" onclick="applyAll()">⟳ Эту настройку — на все</button>
  <div class="hint">Микс = 2 анимации слоями (напр. spin+pulse). Радуга = цикл цвета. Рандом — сюрприз. .tgs: 512/60fps/луп, 1 бит = 120 BPM.</div>
</aside>
<script src="bases.js"></script><script src="studio.js"></script>
<script>
let currentPack='dropweb';
async function bootstrapPack(name){try{const r=await fetch('/api/pack?name='+encodeURIComponent(name));if(!r.ok)throw new Error('pack '+r.status);const p=await r.json();window.ORDER=p.order||[];window.ANCHORS=p.anchors||{};window.DEFMAP=p.defmap||{};window.BASES=p.bases||{};window.SPECS=p.specs||{};currentPack=name;}catch(e){if(name==='dropweb'){window.ORDER=window.ORDER||[];window.ANCHORS=window.ANCHORS||{};window.DEFMAP=window.DEFMAP||{};window.BASES=window.BASES||{};window.SPECS=window.SPECS||{};currentPack='dropweb';}else{throw e;}}}
(async()=>{
const PRESETS=["#00DE52","#38BDF8","#A78BFA","#EF4444","#F59E0B","#F5A3C7","#FFFFFF"];
let state={}; function defaultCfg(id){const k=(id&&DEFMAP[id])||"beat";return {kinds:[k],beats:(BEATS_DEFAULT[k]||1),amp:14,ov:10,color:"#00DE52",cycle:false,outline:false,width:14,bg:false,bgrx:0.16,bgfill:'#08090C'};}
let cur='',players={},big=null;
function cfg(id){return state[id];}
function setBg(c){var v=(c==='checker')?'var(--checker)':c;document.getElementById('big').style.background=v;document.querySelectorAll('.lp').forEach(e=>e.style.background=v);}
const ksel=document.getElementById('kind'),ksel2=document.getElementById('kind2');
function fillSel(sel,withEmpty){if(withEmpty)sel.appendChild(new Option('— нет —',''));for(const cat in CATS){if(cat==='—')continue;const og=document.createElement('optgroup');og.label=cat;CATS[cat].forEach(k=>og.appendChild(new Option(k,k)));sel.appendChild(og);}if(!withEmpty)sel.appendChild(new Option('none','none'));}
fillSel(ksel,false);fillSel(ksel2,true);
const swDiv=document.getElementById('sw'); PRESETS.forEach(c=>{const s=document.createElement('div');s.className='sw';s.style.background=c;s.title=c;s.onclick=()=>{state[cur].color=c;state[cur].cycle=false;document.getElementById('custom').value=c;upd();};swDiv.appendChild(s);});
const grid=document.getElementById('grid');
function addCell(id){const c=document.createElement('div');c.className='cell';c.id='c_'+id;c.innerHTML=`<div class="lp" id="lp_${id}"></div><div class="nm">${ANCHORS[id]||''} ${id}</div>`;c.onclick=()=>select(id);grid.appendChild(c);renderCell(id);}
function renderCell(id){if(players[id])players[id].destroy();players[id]=lottie.loadAnimation({container:document.getElementById('lp_'+id),renderer:'svg',loop:true,autoplay:true,animationData:makeAnimX(BASES[id],cfg(id))});}
function renderBig(){if(big)big.destroy();big=lottie.loadAnimation({container:document.getElementById('big'),renderer:'svg',loop:true,autoplay:true,animationData:makeAnimX(BASES[cur],cfg(cur))});}
function syncPanel(){const s=cfg(cur);ksel.value=s.kinds[0]||'beat';ksel2.value=s.kinds[1]||'';beats.value=s.beats;amp.value=s.amp;ov.value=s.ov;vbeats.textContent=s.beats;vamp.textContent=s.amp;vov.textContent=s.ov;document.getElementById('custom').value=s.color;document.getElementById('width').value=s.width||14;document.getElementById('outline').classList.toggle('on',!!s.outline);document.getElementById('outline').style.borderColor=s.outline?'#00DE52':'#1c2c25';document.getElementById('curname').textContent=(ANCHORS[cur]||'')+' '+cur;document.getElementById('cur').textContent=cur+' · '+s.kinds.join('+')+(s.cycle?' · 🌈':'');document.querySelectorAll('.sw').forEach((e,i)=>e.classList.toggle('on',!s.cycle&&PRESETS[i]===s.color));document.getElementById('bgtile').checked=!!s.bg;document.getElementById('bgctl').style.display=s.bg?'flex':'none';document.getElementById('bgrx').value=Math.round((s.bgrx!=null?s.bgrx:0.16)*100);document.getElementById('bgfill').value=s.bgfill||'#08090C';}
function upd(){syncPanel();renderBig();renderCell(cur);}
function select(id){document.querySelectorAll('.cell').forEach(e=>e.classList.remove('sel'));document.getElementById('c_'+id).classList.add('sel');cur=id;syncPanel();renderBig();}
ksel.onchange=e=>{state[cur].kinds[0]=e.target.value;state[cur].beats=(BEATS_DEFAULT[e.target.value]||state[cur].beats);upd();};
ksel2.onchange=e=>{state[cur].kinds=e.target.value?[state[cur].kinds[0],e.target.value]:[state[cur].kinds[0]];upd();};
['beats','amp','ov'].forEach(p=>document.getElementById(p).oninput=e=>{state[cur][p]=parseInt(e.target.value);upd();});
document.getElementById('custom').oninput=e=>{state[cur].color=e.target.value;state[cur].cycle=false;upd();};
document.getElementById('rainbow').onclick=()=>{state[cur].cycle=!state[cur].cycle;upd();};
document.getElementById('outline').onclick=()=>{state[cur].outline=!state[cur].outline;upd();};
document.getElementById('width').oninput=e=>{state[cur].width=parseInt(e.target.value);upd();};
document.getElementById('bgtile').onchange=e=>{state[cur].bg=e.target.checked;document.getElementById('bgctl').style.display=e.target.checked?'flex':'none';upd();};
document.getElementById('bgrx').oninput=e=>{state[cur].bgrx=(+e.target.value)/100;upd();};
document.getElementById('bgfill').oninput=e=>{state[cur].bgfill=e.target.value;upd();};
function rnd(cz){state[cur]=randomCfg(cz);upd();}
function rndAll(){ORDER.forEach(id=>{state[id]=randomCfg();renderCell(id);});renderBig();syncPanel();}
function applyAll(){const s=cfg(cur);ORDER.forEach(id=>{state[id]={kinds:[...s.kinds],beats:s.beats,amp:s.amp,ov:s.ov,color:s.color,cycle:s.cycle,outline:s.outline,width:s.width,bg:s.bg};renderCell(id);});}
function tgs(id){return new Blob([pako.gzip(JSON.stringify(makeAnimX(BASES[id],cfg(id))))],{type:'application/gzip'});}
function dl(b,n){const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u);}
function exportOne(){dl(tgs(cur),cur+'.tgs');}
async function exportAll(){const z=new JSZip();ORDER.forEach(id=>z.file(id+'.tgs',tgs(id)));dl(await z.generateAsync({type:'blob'}),'dropweb_tgs.zip');}
const genId=document.getElementById('genid'),promptEl=document.getElementById('prompt'),genColor=document.getElementById('gencolor'),statusEl=document.getElementById('genstatus'),fileEl=document.getElementById('pngfile');
function slug(v){return (v||'').trim().toLowerCase().replace(/[^a-z0-9_-]+/g,'-').replace(/^-+|-+$/g,'');}
function setStatus(t,cls){statusEl.textContent=t||'';statusEl.className='status '+(cls||'');}
function mapKindToTgs(s){const k=(s.kinds&&s.kinds[0])||'pulse_offset';return {preset:k.startsWith('el_')?k.slice(3):'pulse_offset',params:{},bg:!!s.bg};}
function absorb(resp,source){const id=resp.id||slug(genId.value)||cur;BASES[id]=resp.base;if(!ORDER.includes(id)){ORDER.push(id);state[id]=defaultCfg(id);addCell(id);}ANCHORS[id]=resp.anchor||ANCHORS[id]||'';state[id].color=genColor.value;state[id].source=source;renderCell(id);select(id);setStatus(resp.warn||'готово ✓',resp.warn?'err':'ok');}
async function postJSON(url,body){setStatus('загрузка…');const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok){let msg=r.status===503?'нет CLIPROXY_KEY — используй Загрузить PNG':'ошибка '+r.status;try{const j=await r.json();msg=j.error||j.detail||msg;}catch(e){}throw new Error(msg);}return r.json();}
let refB64 = null;
const reffile=document.getElementById('reffile'), refBtn=document.getElementById('refBtn'),
      refthumb=document.getElementById('refthumb'), refimg=document.getElementById('refimg'),
      refclear=document.getElementById('refclear');
refBtn.onclick=()=>reffile.click();
reffile.onchange=()=>{const f=reffile.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{refB64=rd.result; refimg.src=refB64; refthumb.style.display='flex';}; rd.readAsDataURL(f);};
refclear.onclick=()=>{refB64=null; reffile.value=''; refthumb.style.display='none';};
document.getElementById('generate').onclick=async()=>{try{const id=slug(genId.value)||cur;absorb(await postJSON('/api/generate',{prompt:promptEl.value,id,color:genColor.value,ref:refB64}), 'gen');}catch(e){setStatus(e.message,'err');}};
document.getElementById('regen').onclick=async()=>{try{absorb(await postJSON('/api/regenerate',{id:cur,prompt:promptEl.value}), 'gen');}catch(e){setStatus(e.message,'err');}};
document.getElementById('uploadBtn').onclick=()=>fileEl.click();
fileEl.onchange=()=>{const f=fileEl.files&&fileEl.files[0];if(!f)return;const rd=new FileReader();rd.onload=async()=>{try{const png_b64=String(rd.result).split(',')[1];absorb(await postJSON('/api/upload',{png_b64,id:slug(genId.value)||cur,color:genColor.value}), 'upload');}catch(e){setStatus(e.message,'err');}};rd.readAsDataURL(f);};
document.getElementById('save').onclick=async()=>{try{const s=state[cur];await postJSON('/api/save',{pack:currentPack,id:cur,base:BASES[cur],spec:{source:s.source||'gen',prompt:promptEl.value,color:s.color,anchor:ANCHORS[cur],tgs:mapKindToTgs(s),studio:s},cfg:s});setStatus('сохранено ✓','ok');}catch(e){setStatus(e.message,'err');}};
function fillPackSel(names,def){const sel=document.getElementById('packsel');sel.innerHTML='';(names||[]).forEach(n=>sel.appendChild(new Option(n,n)));if(def)sel.value=def;}
function renderEmptyOrGrid(){if(ORDER.length===0){cur='';grid.innerHTML='<div class="emptygrid">Пусто. Создай из промта или загрузи PNG →</div>';if(big){try{big.destroy()}catch(e){}big=null;}document.getElementById('big').innerHTML='';document.getElementById('curname').textContent='—';document.getElementById('cur').textContent='—';}else{ORDER.forEach(id=>addCell(id));cur=ORDER[0];select(cur);}}
async function loadPack(name){await bootstrapPack(name);document.getElementById('studioTitle').textContent='STUDIO · '+name;Object.values(players).forEach(p=>{try{p.destroy()}catch(e){}});players={};state={};ORDER.forEach(id=>state[id]=defaultCfg(id));grid.innerHTML='';renderEmptyOrGrid();}
document.getElementById('packsel').onchange=e=>loadPack(e.target.value);
document.getElementById('newpack').onclick=async()=>{const raw=prompt('Имя нового пака (a-z, 0-9, -, _):');if(!raw)return;const name=slug(raw);try{await postJSON('/api/pack/create',{name});const o=new Option(name,name);document.getElementById('packsel').appendChild(o);document.getElementById('packsel').value=name;await loadPack(name);setStatus('пак создан: '+name,'ok');}catch(e){setStatus(e.message,'err');}};
document.getElementById('renpack').onclick=async()=>{const to=slug(prompt('Новое имя пака:',currentPack)||'');if(!to||to===currentPack)return;try{await postJSON('/api/pack/rename',{from:currentPack,to});const r=await fetch('/api/packs').then(x=>x.json());fillPackSel(r.packs,r.default);document.getElementById('packsel').value=to;await loadPack(to);setStatus('переименован: '+to,'ok');}catch(e){setStatus(e.message,'err');}};
document.getElementById('delpack').onclick=async()=>{if(currentPack==='dropweb'){setStatus('нельзя удалить пак по умолчанию','err');return;}if(!confirm('Удалить пак '+currentPack+'?'))return;try{await postJSON('/api/pack/delete',{name:currentPack});const r=await fetch('/api/packs').then(x=>x.json());fillPackSel(r.packs,r.default);document.getElementById('packsel').value=r.default;await loadPack(r.default);setStatus('пак удалён','ok');}catch(e){setStatus(e.message,'err');}};
document.getElementById('delemoji').onclick=async()=>{if(!cur){return;}if(!confirm('Удалить эмодзи '+cur+'?'))return;try{await postJSON('/api/emoji/delete',{pack:currentPack,id:cur});const id=cur;delete BASES[id];const i=ORDER.indexOf(id);if(i>=0)ORDER.splice(i,1);delete state[id];const cell=document.getElementById('c_'+id);if(cell)cell.remove();if(players[id]){try{players[id].destroy()}catch(e){}delete players[id];}cur=ORDER[0]||'';if(cur){select(cur);}else{if(big){try{big.destroy()}catch(e){}big=null;}document.getElementById('big').innerHTML='';document.getElementById('curname').textContent='—';}setStatus('эмодзи удалён','ok');}catch(e){setStatus(e.message,'err');}};
window.setBg=setBg;window.rnd=rnd;window.rndAll=rndAll;window.applyAll=applyAll;window.exportOne=exportOne;window.exportAll=exportAll;
const pk=await fetch('/api/packs').then(r=>r.json()).catch(()=>({packs:['dropweb'],default:'dropweb'}));
fillPackSel(pk.packs,pk.default);
await loadPack(pk.default||'dropweb');
})();
</script></body></html>
